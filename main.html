<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Synthesis</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voiceinator">

      <h1>The Voiceinator 5000</h1>

      <select name="voice" id="voices">
        <option value="">Select A Voice</option>
      </select>

      <label for="rate">Rate:</label>
      <input name="rate" type="range" min="0" max="3" value="1" step="0.1">

      <label for="pitch">Pitch:</label>

      <input name="pitch" type="range" min="0" max="2" step="0.1">
      <textarea name="text">Hello! I love JavaScript 👍</textarea>
      <button id="stop">Stop!</button>
      <button id="speak">Speak</button>

    </div>

<script>
  const msg = window.speechSynthesis;
  const voicesDropdown = document.querySelector('[name="voice"]');
  const options = document.querySelectorAll('[type="range"], [name="text"]');
  const speakButton = document.querySelector('#speak');
  const stopButton = document.querySelector('#stop');

  //Your code goes here
  let voices;

  function loadVoices() {
  voices = msg.getVoices();
  for(let i = 0; i < voices.length; i++){
    const option = document.createElement('option');
    option.textContent = `${voices[i].name} ${voices[i].lang}`;
    option.value = i;
    voicesDropdown.appendChild(option);
  }
}

  if ("onvoiceschanged" in msg) {
    msg.onvoiceschanged = loadVoices;
  } else {
    loadVoices();
  }

  function speak(voice){
    if(msg.speaking){
        msg.cancel();
      } 
	  const utterThis = new SpeechSynthesisUtterance(options[2].value);
    utterThis.voice = voices[voice];
    utterThis.rate = options[0].value;
    utterThis.pitch = options[1].value;
	  msg.speak(utterThis);
  }

  voicesDropdown.addEventListener('change',()=>{
      speak(voicesDropdown.value);
  })

  speakButton.addEventListener('click',(e)=>{
	  e.preventDefault();
    if(options[2].value == '') return;
    if(!voicesDropdown.value || voicesDropdown.value == ''){
      alert("Selecte voice first");
    }else{
      speak(voicesDropdown.value);
    }
  });
</script>

</body>
</html>
